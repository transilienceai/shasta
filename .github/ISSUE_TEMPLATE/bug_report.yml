name: Bug Report
description: Report a bug, false positive, or broken workflow
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - AWS scanner
        - Reporting
        - Remediation
        - Policies
        - Evidence or access review
        - SBOM or threat advisory
        - Packaging or CI
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Python:
        - AWS auth method:
        - Command:

