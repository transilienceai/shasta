name: Feature Request
description: Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AWS coverage
        - CLI ergonomics
        - Reporting
        - Remediation
        - Policies or evidence
        - Supply chain workflows
        - Documentation
        - Developer experience
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the repository do differently?
    validations:
      required: true

  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      options:
        - I plan to submit a PR
        - I can help test
        - I am only proposing the idea
    validations:
      required: true

