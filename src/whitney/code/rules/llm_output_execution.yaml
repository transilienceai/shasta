rules:
  # ===================================================================
  # LLM output → code execution (insecure output handling)
  # ===================================================================
  # Detects patterns where LLM-generated content is passed to code
  # execution functions. An attacker who controls LLM output via prompt
  # injection can achieve remote code execution.

  # --- OpenAI response → exec/eval ---
  - id: code-llm-output-exec-openai
    patterns:
      - pattern-either:
          - pattern: |
              $OUTPUT = $RESP.choices[0].message.content
              ...
              exec($OUTPUT)
          - pattern: |
              $OUTPUT = $RESP.choices[0].message.content
              ...
              eval($OUTPUT)
          - pattern: exec($RESP.choices[0].message.content)
          - pattern: eval($RESP.choices[0].message.content)
          - pattern: |
              $OUTPUT = $RESP.choices[0].message.content
              ...
              subprocess.run($OUTPUT, ...)
          - pattern: |
              $OUTPUT = $RESP.choices[0].message.content
              ...
              subprocess.run([$OUTPUT, ...], ...)
          - pattern: |
              $OUTPUT = $RESP.choices[0].message.content
              ...
              os.system($OUTPUT)
    message: >
      OpenAI response content is passed to code execution (exec/eval/subprocess/os.system).
      An attacker who achieves prompt injection can execute arbitrary code on the server.
      Never execute LLM output as code without sandboxing.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-llm-output-execution
      whitney_severity: critical
      cwe: ["CWE-94", "CWE-95"]
      owasp: ["LLM02:2025"]
      confidence: HIGH
      category: security
      technology: [openai]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Never pass LLM output to exec(), eval(), or subprocess. If code
        execution is required, use a sandboxed environment (Docker, gVisor,
        E2B) with strict resource limits and no network access.

  # --- Anthropic response → exec/eval ---
  - id: code-llm-output-exec-anthropic
    patterns:
      - pattern-either:
          - pattern: |
              $OUTPUT = $RESP.content[0].text
              ...
              exec($OUTPUT)
          - pattern: |
              $OUTPUT = $RESP.content[0].text
              ...
              eval($OUTPUT)
          - pattern: exec($RESP.content[0].text)
          - pattern: eval($RESP.content[0].text)
          - pattern: |
              $OUTPUT = $RESP.content[0].text
              ...
              subprocess.run($OUTPUT, ...)
          - pattern: |
              $OUTPUT = $RESP.content[0].text
              ...
              os.system($OUTPUT)
    message: >
      Anthropic response content is passed to code execution.
      Never execute LLM output as code without sandboxing.
    severity: ERROR
    languages: [python]
    metadata:
      check_id: code-llm-output-execution
      whitney_severity: critical
      cwe: ["CWE-94", "CWE-95"]
      owasp: ["LLM02:2025"]
      confidence: HIGH
      category: security
      technology: [anthropic]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Never pass LLM output to exec(), eval(), or subprocess. Use a
        sandboxed environment for code execution.

  # --- Generic: exec/eval on variable named like LLM output ---
  - id: code-llm-output-exec-generic
    pattern-regex: "(?:^|\\s|;)(?:exec|eval)\\s*\\(\\s*(?:response|completion|output|result|answer|generated|llm_output|ai_response|chat_response|model_output)"
    message: >
      Variable with LLM-output-like name passed to exec() or eval().
      Verify this is not LLM-generated content being executed as code.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test*"
        - "**/tests/**"
    metadata:
      check_id: code-llm-output-execution
      whitney_severity: high
      cwe: ["CWE-94"]
      owasp: ["LLM02:2025"]
      confidence: LOW
      category: security
      technology: [generic]
      references:
        - https://owasp.org/www-project-top-10-for-large-language-model-applications/
      soc2_controls: ["CC6.1", "CC7.2"]
      remediation: >
        Never pass LLM output to exec() or eval(). Use a sandboxed
        environment if code execution is required.
